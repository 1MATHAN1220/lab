<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Premium Code Buttons</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: 'Segoe UI', sans-serif;
}

body{
    height:100vh;
    background:url('bg4.jpg') no-repeat center center/cover;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    backdrop-filter: blur(8px);
}

/* Glass Container */
.container{
    background: rgba(29, 90, 87, 0.6);
    backdrop-filter: blur(15px);
    border-radius:20px;
    padding:30px;
    width:90%;
    max-width:1000px;
    box-shadow:0 0 40px rgba(153, 19, 19, 0.6);
    animation:fadeIn 1s ease-in-out;
}

/* Grid Buttons */
.buttons{
    display:grid;
    grid-template-columns: repeat(auto-fit,minmax(120px,1fr));
    gap:15px;
}

.buttons button{
    padding:12px;
    border:none;
    border-radius:12px;
    cursor:pointer;
    background:rgba(151, 9, 109, 0.1);
    color:white;
    font-weight:bold;
    backdrop-filter:blur(10px);
    transition:0.3s;
}

.buttons button:hover{
    background:rgba(255,255,255,0.3);
    transform:scale(1.08);
}

/* Code Box */
.code-box{
    margin-top:20px;
    display:none;
    position:relative;
    background:rgba(0,0,0,0.85);
    color:#00ff88;
    padding:20px;
    border-radius:15px;
    max-height:300px;
    overflow:auto;
    animation:slideUp 0.5s ease;
}

.copy-btn{
    position:absolute;
    top:10px;
    right:10px;
    padding:5px 12px;
    border:none;
    border-radius:6px;
    background:#00ff88;
    cursor:pointer;
    font-weight:bold;
}

.copy-btn:hover{
    background:#00cc66;
}

@keyframes fadeIn{
    from{opacity:0;transform:scale(0.9);}
    to{opacity:1;transform:scale(1);}
}

@keyframes slideUp{
    from{opacity:0;transform:translateY(20px);}
    to{opacity:1;transform:translateY(0);}
}

/* Mobile */
@media(max-width:600px){
    .container{
        padding:15px;
    }
    .buttons button{
        font-size:12px;
        padding:8px;
    }
}
</style>
</head>
<body>

6: `import sys

class MaxHeap:
    def __init__(self, maxsize):
        self.maxsize = maxsize
        self.size = 0
        self.Heap = [0] * (self.maxsize + 1)
        self.Heap[0] = sys.maxsize
        self.FRONT = 1

    def parent(self, pos):
        return pos // 2

    def leftChild(self, pos):
        return 2 * pos

    def rightChild(self, pos):
        return (2 * pos) + 1

    def isLeaf(self, pos):
        if pos >= (self.size // 2) + 1 and pos <= self.size:
            return True
        return False

    def swap(self, fpos, spos):
        self.Heap[fpos], self.Heap[spos] = self.Heap[spos], self.Heap[fpos]

    def maxHeapify(self, pos):
        if not self.isLeaf(pos):
            left = self.leftChild(pos)
            right = self.rightChild(pos)
            if (left <= self.size and self.Heap[pos] < self.Heap[left]) or \
               (right <= self.size and self.Heap[pos] < self.Heap[right]):
                if right > self.size or self.Heap[left] > self.Heap[right]:
                    self.swap(pos, left)
                    self.maxHeapify(left)
                else:
                    self.swap(pos, right)
                    self.maxHeapify(right)

    def insertNode(self, element):
        if self.size >= self.maxsize:
            return
        self.size += 1
        self.Heap[self.size] = element
        current = self.size
        while self.Heap[current] > self.Heap[self.parent(current)]:
            self.swap(current, self.parent(current))
            current = self.parent(current)

    def Print(self):
        for i in range(1, (self.size // 2) + 1):
            left = self.Heap[2 * i] if 2 * i <= self.size else None
            right = self.Heap[2 * i + 1] if 2 * i + 1 <= self.size else None
            print(f"PARENT NODE : {self.Heap[i]} LEFT CHILD : {left} RIGHT CHILD : {right}")

    def extractMaximum(self):
        if self.size == 0:
            return None
        popped = self.Heap[self.FRONT]
        self.Heap[self.FRONT] = self.Heap[self.size]
        self.size -= 1
        self.maxHeapify(self.FRONT)
        return popped


if __name__ == "__main__":
    maxHeap = MaxHeap(15)
    maxHeap.insertNode(5)
    maxHeap.insertNode(9)
    maxHeap.insertNode(1)
    maxHeap.insertNode(11)
    maxHeap.insertNode(28)

    maxHeap.Print()

8: `def partition(array, low, high):
    pivot = array[high]  # pivot
    i = low - 1          # index of smaller element

    for j in range(low, high):
        if array[j] <= pivot:
            i = i + 1
            array[i], array[j] = array[j], array[i]

    # swap the pivot element with the element at i+1
    array[i + 1], array[high] = array[high], array[i + 1]
    return i + 1


def quickSort(array, low, high):
    if low < high:
        pi = partition(array, low, high)

        # Recursively sort elements before and after partition
        quickSort(array, low, pi - 1)
        quickSort(array, pi + 1, high)


# Example usage
data = [1, 7, 4, 1, 10, 9, -2]
print("Unsorted Array:")
print(data)

size = len(data)
quickSort(data, 0, size - 1)

print("Sorted Array in Ascending Order:")
print(data)
`,

9: `class Node:
    def __init__(self, key):
        self.key = key
        self.left = None
        self.right = None

def inorder(root):
    if root is not None:
        inorder(root.left)
        print(str(root.key) + " ->", end=' ')
        inorder(root.right)

def insert(node, key):
    if node is None:
        return Node(key)
    if key < node.key:
        node.left = insert(node.left, key)
    else:
        node.right = insert(node.right, key)
    return node

def minValueNode(node):
    current = node
    while current.left is not None:
        current = current.left
    return current

def deleteNode(root, key):
    if root is None:
        return root

    # Go to left subtree
    if key < root.key:
        root.left = deleteNode(root.left, key)

    # Go to right subtree
    elif key > root.key:
        root.right = deleteNode(root.right, key)

    # Node to delete found
    else:
        # Node with only one child or no child
        if root.left is None:
            temp = root.right
            root = None
            return temp
        elif root.right is None:
            temp = root.left
            root = None
            return temp

        # Node with two children: get inorder successor
        temp = minValueNode(root.right)
        root.key = temp.key
        root.right = deleteNode(root.right, temp.key)

    return root

# Example usage
if __name__ == "__main__":
    root = None
    keys = [50, 30, 20, 40, 70, 60, 80]

    for key in keys:
        root = insert(root, key)

    print("Inorder traversal of the BST:")
    inorder(root)
    print("\n")

    key_to_delete = 50
    root = deleteNode(root, key_to_delete)
    print(f"Inorder traversal after deleting {key_to_delete}:")
    inorder(root)
    print()
`,

function showCode(num){
    document.getElementById("codeBox").style.display="block";
    document.getElementById("codeContent").innerText=codes[num];
}

function copyCode(){
    let text=document.getElementById("codeContent").innerText;
    navigator.clipboard.writeText(text);
    alert("✅ Code Copied Successfully!");
}
